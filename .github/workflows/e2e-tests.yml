name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  POSTGRES_VERSION: '14'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudweave_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: CloudWeave/package-lock.json
      
      - name: Install dependencies
        working-directory: CloudWeave
        run: npm ci
      
      - name: Run database migrations
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
        run: npm run db:migrate
      
      - name: Run unit tests
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
        run: npm run test:coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: CloudWeave/coverage/lcov.info
          flags: unit-tests
          name: unit-test-coverage

  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudweave_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: CloudWeave/package-lock.json
      
      - name: Install dependencies
        working-directory: CloudWeave
        run: npm ci
      
      - name: Setup test database
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
        run: |
          npm run db:migrate
          npm run db:seed
      
      - name: Start backend server
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
          PORT: 3000
        run: |
          npm run dev &
          sleep 10
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/v1/health
      
      - name: Install Newman
        run: npm install -g newman
      
      - name: Run API tests
        working-directory: CloudWeave
        run: newman run tests/api/postman-collection.json -e tests/api/environment.json --reporters cli,json --reporter-json-export test-results/api-results.json
      
      - name: Upload API test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: api-test-results
          path: CloudWeave/test-results/api-results.json

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudweave_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install backend dependencies
        working-directory: CloudWeave
        run: npm ci
      
      - name: Install frontend dependencies
        working-directory: CloudWeave/frontend
        run: npm ci
      
      - name: Setup test database
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
        run: |
          npm run db:migrate
          npm run db:seed
      
      - name: Build frontend
        working-directory: CloudWeave/frontend
        run: npm run build
      
      - name: Install Playwright browsers
        working-directory: CloudWeave
        run: npx playwright install --with-deps
      
      - name: Start services
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
        run: |
          # Start backend
          npm run dev &
          
          # Start frontend
          cd frontend && npm run dev &
          cd ..
          
          # Wait for services to be ready
          sleep 15
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/v1/health
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:5173
      
      - name: Run E2E tests
        working-directory: CloudWeave
        env:
          BASE_URL: http://localhost:5173
        run: npx playwright test
      
      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results
          path: |
            CloudWeave/test-results/
            CloudWeave/playwright-report/
      
      - name: Upload E2E test videos
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: e2e-test-videos
          path: CloudWeave/test-results/videos/

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[perf-test]')
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudweave_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: CloudWeave/package-lock.json
      
      - name: Install dependencies
        working-directory: CloudWeave
        run: npm ci
      
      - name: Setup test database
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: test
        run: |
          npm run db:migrate
          npm run db:seed
      
      - name: Start backend server
        working-directory: CloudWeave
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudweave_test
          NODE_ENV: production
          PORT: 3000
        run: |
          npm run build
          npm start &
          sleep 10
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/v1/health
      
      - name: Install Artillery
        run: npm install -g artillery@latest
      
      - name: Run performance tests
        working-directory: CloudWeave
        run: artillery run tests/performance/load-test.yml --output test-results/performance-results.json
      
      - name: Generate performance report
        working-directory: CloudWeave
        run: artillery report test-results/performance-results.json --output test-results/performance-report.html
      
      - name: Upload performance test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: |
            CloudWeave/test-results/performance-results.json
            CloudWeave/test-results/performance-report.html

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'CloudWeave'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run npm audit
        working-directory: CloudWeave
        run: |
          npm audit --audit-level moderate --json > security-audit.json || true
          
      - name: Upload security audit results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-audit-results
          path: CloudWeave/security-audit.json

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v3
      
      - name: Generate test summary
        run: |
          echo "# 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.api-tests.result }}" == "success" ]; then
            echo "| API Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| API Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "| E2E Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| E2E Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Test Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- Unit test coverage reports" >> $GITHUB_STEP_SUMMARY
          echo "- API integration test results" >> $GITHUB_STEP_SUMMARY
          echo "- E2E test reports and videos" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "- Performance test results" >> $GITHUB_STEP_SUMMARY
          fi